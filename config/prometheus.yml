global:
  scrape_interval: 5s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

scrape_configs:
  - job_name: 'service'
    static_configs:
      - targets: ['service:9100']
        labels:
          container_name: 'service'

rule_files:
  - "alert_rules.yml"